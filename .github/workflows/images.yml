name: Ember images

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "embers/**"
      - ".github/workflows/images.yml"
  pull_request:
    paths:
      - "embers/**"
      - ".github/workflows/images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ember-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Java 11
            file: embers/java/Dockerfile
            tag: java11
            platforms: linux/amd64,linux/arm64
            build_args: JAVA_VERSION=11
          - name: Java 17
            file: embers/java/Dockerfile
            tag: java17
            platforms: linux/amd64,linux/arm64
            build_args: JAVA_VERSION=17
          - name: Java 21
            file: embers/java/Dockerfile
            tag: java21
            platforms: linux/amd64,linux/arm64
            build_args: JAVA_VERSION=21
          - name: Java 25
            file: embers/java/Dockerfile
            tag: java25
            platforms: linux/amd64,linux/arm64
            build_args: JAVA_VERSION=25
          - name: SteamCMD
            file: embers/steamcmd/Dockerfile
            tag: steamcmd
            platforms: linux/amd64
            build_args: ""
    name: ${{ matrix.name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@b92b65869c4ab8f6c1ab0dfc473a95c8db33a493 # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/kiln-site/ember:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}
          provenance: mode=max
          sbom: true

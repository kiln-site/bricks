name: Java Embers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"
  push:
    branches: [main]
    paths:
      - "embers/java/**"
      - ".github/workflows/java.yml"
  pull_request:
    paths:
      - "embers/java/**"
      - ".github/workflows/java.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: java-embers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Ember · Java ${{ matrix.version }} · ${{ matrix.architecture }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        version: [11, 17, 21, 25]
        include:
          - architecture: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - architecture: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: embers/java/Dockerfile
          build-args: JAVA_VERSION=${{ matrix.version }}
          platforms: linux/${{ matrix.architecture }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/kiln-site/bricks-java:${{ matrix.version }}-${{ matrix.architecture }}
          cache-from: type=gha,scope=ember-java-${{ matrix.version }}-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=ember-java-${{ matrix.version }}-${{ matrix.architecture }}
          provenance: mode=max
          sbom: true

  publish:
    name: Manifest · Java ${{ matrix.version }}
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        version: [11, 17, 21, 25]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish multi-architecture manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/kiln-site/bricks-java:${{ matrix.version }} \
            ghcr.io/kiln-site/bricks-java:${{ matrix.version }}-amd64 \
            ghcr.io/kiln-site/bricks-java:${{ matrix.version }}-arm64

format: kiln.brick/v1
metadata:
  id: fabric
  name: Fabric
  description: Minimal Minecraft mod-loader runtime with automatic provisioning.
  game: Minecraft
  author: Kiln
  tags: [minecraft, java, mods]
variables:
  version:
    type: string
    label: Minecraft version
    description: Fabric-compatible Minecraft release to install.
    required: true
    default: "1.21.11"
    rules: { pattern: "^[0-9]+(?:\\.[0-9]+){1,2}$", maxLength: 32 }
  memory:
    type: string
    label: Max heap
    description: Maximum Java heap, such as 2G or 4096M.
    required: true
    default: 2G
    rules: { pattern: "^[0-9]+[MG]$", maxLength: 12 }
runtime:
  image: ghcr.io/kiln-site/bricks-java:21
  name: Java 21
  environment:
    KILN_IMPLEMENTATION: fabric
    KILN_VERSION: "{{ variables.version }}"
    KILN_ARTIFACT_URL: "https://mcjarfiles.com/api/get-jar/modded/fabric/{{ variables.version }}"
    KILN_ARTIFACT_FILE: fabric-server-launcher.jar
    KILN_SERVER_KIND: minecraft
    MIN_RAM: 512M
    MAX_RAM: "{{ variables.memory }}"
  resources:
    memory: "{{ variables.memory }}"
    memoryReservation: "{{ variables.memory }}"
    pids: 512
  storage: { mount: /server }
network:
  mode: minecraft-backend
  primaryPort: game
  hostname: "{{ variables.version }}.{{ brick.id }}"
  ports:
    - { name: game, container: 25565, protocol: tcp }
constraints:
  architectures: [amd64, arm64]

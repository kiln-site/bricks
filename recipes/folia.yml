format: kiln.brick/v1
metadata:
  id: folia
  name: Folia
  description: Paper's regionized multithreaded server for concurrency-heavy worlds.
  game: Minecraft
  author: Kiln
  tags: [minecraft, java, plugins]
variables:
  version:
    type: string
    label: Minecraft version
    description: Folia release to install.
    required: true
    default: "1.21.11"
    rules: { pattern: "^[0-9]+(?:\\.[0-9]+){1,2}$", maxLength: 32 }
  memory:
    type: string
    label: Max heap
    description: Maximum Java heap, such as 3G or 6144M.
    required: true
    default: 3G
    rules: { pattern: "^[0-9]+[MG]$", maxLength: 12 }
runtime:
  image: ghcr.io/kiln-site/ember:java21
  name: Java 21
  environment:
    KILN_IMPLEMENTATION: folia
    KILN_VERSION: "{{ variables.version }}"
    KILN_ARTIFACT_URL: "https://mcjarfiles.com/api/get-jar/servers/folia/{{ variables.version }}"
    KILN_ARTIFACT_FILE: folia.jar
    KILN_SERVER_KIND: minecraft
    MIN_RAM: 512M
    MAX_RAM: "{{ variables.memory }}"
  resources:
    memory: "{{ variables.memory }}"
    memoryReservation: "{{ variables.memory }}"
    pids: 1024
  storage: { mount: /server }
network:
  mode: minecraft-backend
  primaryPort: game
  hostname: "{{ variables.version }}.{{ brick.id }}"
  ports:
    - { name: game, container: 25565, protocol: tcp }
constraints:
  architectures: [amd64, arm64]
